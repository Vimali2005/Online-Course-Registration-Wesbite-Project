<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Future Coders Academy 🚀</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        font-size: 14px;
        color: #000;
        background: #fff;
      }

      header {
        text-align: center;
        padding: 20px 10px 10px;
        border-bottom: 2px solid #000;
      }
      header h1 {
        font-size: 26px;
        font-weight: bold;
      }
      header nav {
        margin: 6px 0;
        font-weight: bold;
        font-size: 14px;
      }
      header nav a {
        color: #000;
        text-decoration: none;
        margin: 0 6px;
      }
      header nav a:hover {
        text-decoration: underline;
      }
      header p {
        color: #6060c0;
        font-size: 13px;
        margin-top: 6px;
      }

      main {
        max-width: 860px;
        margin: 30px auto;
        padding: 0 16px;
      }

      h2 {
        text-align: center;
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 20px;
      }

      table.form-table {
        margin: 0 auto;
        border-collapse: separate;
        border-spacing: 8px 10px;
      }
      table.form-table td {
        font-size: 14px;
        vertical-align: middle;
      }
      table.form-table td:first-child {
        text-align: right;
        white-space: nowrap;
      }
      table.form-table input[type="text"],
      table.form-table input[type="email"],
      table.form-table input[type="number"],
      table.form-table select {
        width: 200px;
        padding: 3px 5px;
        border: 1px solid #aaa;
        font-size: 13px;
      }
      table.form-table input[type="radio"] {
        margin-right: 4px;
      }
      table.form-table input[type="file"] {
        font-size: 13px;
      }

      .btn-row {
        text-align: center;
        margin-top: 10px;
      }
      .btn-row input[type="reset"],
      .btn-row input[type="submit"] {
        padding: 4px 16px;
        font-size: 13px;
        margin: 0 10px;
        cursor: pointer;
        border: 1px solid #aaa;
        background: #f0f0f0;
      }
      .btn-row input[type="submit"]:hover,
      .btn-row input[type="reset"]:hover {
        background: #ddd;
      }

      footer {
        text-align: center;
        padding: 14px;
        border-top: 2px solid #000;
        margin-top: 40px;
        font-size: 13px;
      }
      footer a {
        color: #6060c0;
        text-decoration: underline;
        margin: 0 6px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Future Coders Academy 🚀</h1>
      <nav>
        <a href="index.html">Training</a> | <a href="#">Tech News</a> |
        <a href="#">Freshers Guide</a>
      </nav>
      <p>
        Empowering young developers to level up their skills through training in
        software development technologies 👨‍💻
      </p>
    </header>

    <main>
      <h2>Registration Form</h2>

      <table class="form-table">
        <tr>
          <td>Name:</td>
          <td><input type="text" id="name" /></td>
        </tr>
        <tr>
          <td>Age:</td>
          <td><input type="text" id="age" /></td>
        </tr>
        <tr>
          <td>Gender:</td>
          <td>
            <input type="radio" name="gender" value="Male" /> Male
            <input
              type="radio"
              name="gender"
              value="Female"
              style="margin-left: 10px"
            />
            Female
          </td>
        </tr>
        <tr>
          <td>Email</td>
          <td><input type="email" id="email" /></td>
        </tr>
        <tr>
          <td>Select a Course:</td>
          <td>
            <select id="course">
              <option>Full Stack Development</option>
              <option>Frontend Development</option>
              <option>Backend Development</option>
              <option>Database</option>
            </select>
          </td>
        </tr>
        <tr>
          <td>Upload your Resume</td>
          <td><input type="file" id="resume" /></td>
        </tr>
        <tr>
          <td colspan="2">
            <div class="btn-row">
              <input type="reset" value="Reset" />
              <input type="submit" value="Submit" onclick="handleSubmit()" />
            </div>
          </td>
        </tr>
      </table>
    </main>

    <footer>
      <a href="index.html">Home</a> | <a href="#">Instagram</a> |
      <a href="#">Youtube</a>
    </footer>

    <script>
      function handleSubmit() {
        const name = document.getElementById("name").value.trim();
        const age = document.getElementById("age").value.trim();
        const email = document.getElementById("email").value.trim();
        const course = document.getElementById("course").value;
        const gender = document.querySelector('input[name="gender"]:checked');

        if (!name || !age || !gender || !email) {
          alert("Please fill in all fields!");
          return;
        }
        alert(
          `Registration Successful!\n\nName: ${name}\nCourse: ${course}\nWe will contact you at ${email}`,
        );
      }
    </script>
  </body>
</html>
